<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mount Morriah</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="overlay"></div>
  <header>
    <h1>Mount Morriah</h1>
    <p class="tagline">A journey through sound & story</p>
  </header>

  <main class="scroll-container">
    <section class="scroll-track">
      <div class="media-item">
        <img src="placeholder-image1.jpg" alt="Scene 1" />
      </div>
      <div class="media-item">
        <video autoplay muted loop>
          <source src="placeholder-video1.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="media-item">
        <img src="placeholder-image2.jpg" alt="Scene 2" />
      </div>
      <div class="media-item">
        <video autoplay muted loop>
          <source src="placeholder-video2.mp4" type="video/mp4" />
        </video>
      </div>
      <!-- Add more items here -->
    </section>
  </main>

  <footer>
    <p>© 2025 Mount Morriah | Designed by Ammanuel</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
